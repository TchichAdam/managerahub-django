{% extends 'app1/base.html' %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-lg-6">
        <div class="card shadow-sm border-0">
            <div class="card-body p-4 text-center">
                <h2 class="fw-bold text-danger mb-3">Supprimer l'offre</h2>
                <p class="text-muted">
                    Vous allez supprimer l'offre <strong>{{ offre.titre }}</strong>.
                </p>
                <p class="mb-4">Cette action est irreversible.</p>
                <form method="post">
                    {% csrf_token %}
                    <div class="d-flex justify-content-center gap-3">
                        <a href="{% url 'entreprise_dashboard' %}" class="btn btn-outline-secondary">Annuler</a>
                        <button type="submit" class="btn btn-danger">Confirmer la suppression</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
